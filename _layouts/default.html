<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title> 
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ "/favicon.ico" | prepend: site.baseurl }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css" />
    <link rel="canonical" href="{{ page.url | replace:'/index.html','/' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} Feed" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ page.url | replace:'/index.html','/' | prepend: site.baseurl | prepend: site.url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    {% if page.banner_image %}
    <meta property="og:image" content="{{ site.url }}/images/posts/{{ page.banner_image }}">
    {% else %}
    <meta property="og:image" content="{{ site.url }}/images/aboutPage.jpeg">
    {% endif %}
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% if page.banner_image %}
    <meta name="twitter:image" content="{{ site.url }}/images/posts/{{ page.banner_image }}">
    {% else %}
    <meta name="twitter:image" content="{{ site.url }}/images/aboutPage.jpeg">
    {% endif %}
</head>
<body>
    <div class="site">
        {% include header_navigation.html %}
        {% include header.html %}
        <div class="site-content outer">
            <div class="inner">
                <main class="site-main">
                    {{content}}
                </main><!-- .site-main -->
            </div><!-- .inner -->
        </div><!-- .site-content -->
        {% include footer.html %}
    </div><!-- .site -->
    {% if site.google_analytics %}
    {% include google_analytics.html %}
    {% endif %}
    <script src="{{ site.baseurl }}/js/scripts.js"></script>
</body>
</html>
